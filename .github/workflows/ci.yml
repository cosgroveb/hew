name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint core
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

      - name: Lint TUI
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1
          working-directory: cmd/hui

      - name: Test core
        run: go test -race ./... -v

      - name: Test TUI
        run: cd cmd/hui && go test -race ./... -v

      - name: Build
        run: make build-all
