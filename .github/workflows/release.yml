name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  debian-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Debian tooling
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -y debhelper dpkg-dev git-buildpackage lintian bash-completion

      - name: Configure git and dch environment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo 'DEBFULLNAME=Brian Cosgrove' >> "$GITHUB_ENV"
          echo 'DEBEMAIL=cosgroveb@gmail.com' >> "$GITHUB_ENV"

      - name: Merge main into debian/main
        run: |
          git checkout debian/main
          git merge --no-edit "${{ github.sha }}"

      - name: Generate changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "${PREV_TAG}" ]; then
            gbp dch --new-version="${VERSION}-1" --distribution=unstable --since="${PREV_TAG}" --commit
          else
            gbp dch --new-version="${VERSION}-1" --distribution=unstable --auto --commit
          fi

      - name: Generate orig tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="hew-${VERSION}/" \
            HEAD -- . ':(exclude)debian' > "../hew_${VERSION}.orig.tar.gz"

      - name: Build amd64 package
        # -d skips Build-Depends check: golang-go comes from actions/setup-go, not apt
        run: dpkg-buildpackage -us -uc -d

      - name: Run lintian
        run: |
          lintian --suppress-tags bad-distribution-in-changes-file,latest-debian-changelog-entry-reuses-existing-version \
            --fail-on error ../*.changes

      - name: Collect build output
        run: |
          cp ../hew_*.deb .
          cp debian/changelog debian-changelog

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-amd64
          path: hew_*.deb

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: debian-changelog
          path: debian-changelog

  debian-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Debian tooling
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -y debhelper dpkg-dev git-buildpackage lintian bash-completion

      - name: Configure git and dch environment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo 'DEBFULLNAME=Brian Cosgrove' >> "$GITHUB_ENV"
          echo 'DEBEMAIL=cosgroveb@gmail.com' >> "$GITHUB_ENV"

      - name: Merge main into debian/main
        run: |
          git checkout debian/main
          git merge --no-edit "${{ github.sha }}"

      - name: Generate changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "${PREV_TAG}" ]; then
            gbp dch --new-version="${VERSION}-1" --distribution=unstable --since="${PREV_TAG}" --commit
          else
            gbp dch --new-version="${VERSION}-1" --distribution=unstable --auto --commit
          fi

      - name: Generate orig tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="hew-${VERSION}/" \
            HEAD -- . ':(exclude)debian' > "../hew_${VERSION}.orig.tar.gz"

      - name: Build arm64 package
        # -d skips Build-Depends check: golang-go comes from actions/setup-go, not apt
        run: dpkg-buildpackage -us -uc -d

      - name: Run lintian
        run: |
          lintian --suppress-tags bad-distribution-in-changes-file,latest-debian-changelog-entry-reuses-existing-version \
            --fail-on error ../*.changes

      - name: Collect build output
        run: cp ../hew_*.deb .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-arm64
          path: hew_*.deb

  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race ./...

      - name: Cross-compile binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
                -o "hew-${GOOS}-${GOARCH}" ./cmd/hew/
            done
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: hew-*

  release:
    needs: [debian-amd64, debian-arm64, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Push debian/main and tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git checkout debian/main
          git merge --no-edit "${{ github.sha }}"
          cp artifacts/debian-changelog/debian-changelog debian/changelog
          git add debian/changelog
          git commit --allow-empty -m "Update changelog for ${VERSION}-1"
          git tag -f "debian/${VERSION}-1"
          git push origin debian/main
          git push origin --force "debian/${VERSION}-1"

      - name: Generate CHANGELOG.md
        run: |
          git checkout main
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          tags=($(git tag -l 'v[0-9]*' --sort=-v:refname))
          for i in "${!tags[@]}"; do
            tag="${tags[$i]}"
            version="${tag#v}"
            date=$(git log -1 --format=%cs "$tag")
            echo "## ${version} (${date})" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            if [ $((i + 1)) -lt ${#tags[@]} ]; then
              prev="${tags[$((i + 1))]}"
              git log --format="- %s" "${prev}..${tag}" -- ':!debian' >> CHANGELOG.md
            else
              git log --format="- %s" "${tag}" -- ':!debian' >> CHANGELOG.md
            fi
            echo "" >> CHANGELOG.md
          done
          git add CHANGELOG.md
          git diff --cached --quiet || {
            git commit -m "Update CHANGELOG.md for ${GITHUB_REF_NAME#v}"
            git push origin main
          }

      - name: Collect assets
        run: |
          mkdir -p release
          cp artifacts/deb-amd64/*.deb release/
          cp artifacts/deb-arm64/*.deb release/
          cp artifacts/binaries/hew-* release/

      - name: Generate source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="hew-${VERSION}/" \
            -o "release/hew_${VERSION}.orig.tar.gz" "${{ github.sha }}"

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*

      - name: Extract release notes
        run: |
          dpkg-parsechangelog -l artifacts/debian-changelog/debian-changelog \
            --show-field Changes > release-notes.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Delete any existing release from a failed run
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true
          gh release create "${GITHUB_REF_NAME}" \
            --title "hew ${VERSION}" \
            --notes-file release-notes.txt \
            release/*

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(curl -sL "https://github.com/cosgroveb/hew/archive/refs/tags/v${VERSION}.tar.gz" | sha256sum | awk '{print $1}')
          git clone "https://x-access-token:${GH_TOKEN}@github.com/cosgroveb/homebrew-tap.git" /tmp/tap
          cd /tmp/tap
          sed -i "s|url \".*\"|url \"https://github.com/cosgroveb/hew/archive/refs/tags/v${VERSION}.tar.gz\"|" Formula/hew.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/hew.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hew.rb
          git diff --cached --quiet || {
            git commit -m "Update hew to ${VERSION}"
            git push
          }
